name: CI

on:
  push:
    branches: [main, development]
    tags: ["v*"]
  pull_request:
    branches: [development, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fast quality gate
        run: npm run check

      - name: Production build
        run: npm run build:ci

  fallow:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fallow baseline report
        env:
          FALLOW_AGENT_SOURCE: github_actions
        run: npm run --silent fallow -- --summary

      - name: Fallow changed-code audit
        if: github.event_name == 'pull_request'
        env:
          FALLOW_AGENT_SOURCE: github_actions
        run: npm run --silent fallow:audit -- --base origin/${{ github.base_ref }}

  browser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Cross-browser editor smoke tests
        run: npm run test:browser

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
