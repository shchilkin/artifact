x-artifact-api-env: &artifact-api-env
  NODE_ENV: production
  ARTIFACT_BUILD_SHA: ${ARTIFACT_BUILD_SHA:-development}
  PORT: 4000
  WEB_ORIGIN: ${WEB_ORIGIN:?Set the primary public Vercel/frontend origin}
  WEB_ORIGINS: ${WEB_ORIGINS:-}
  API_DATABASE_DRIVER: postgres
  DATABASE_URL: postgres://${POSTGRES_USER:-artifact}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-artifact}
  API_QUEUE_DRIVER: bullmq
  REDIS_URL: redis://redis:6379
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?Set a long random JWT fallback secret}
  AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-}
  AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set a long random Better Auth secret}
  BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set the public Better Auth URL}
  OPENAI_API_KEY: ${OPENAI_API_KEY:?Set the OpenAI API key}
  OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-2}
  OPENAI_SHADER_MODEL: ${OPENAI_SHADER_MODEL:-gpt-5.5}
  OPENAI_SHADER_TIMEOUT_MS: ${OPENAI_SHADER_TIMEOUT_MS:-90000}
  XAI_API_KEY: ${XAI_API_KEY:-}
  XAI_IMAGE_MODEL: ${XAI_IMAGE_MODEL:-grok-imagine-image-quality}
  ASSET_STORAGE_DRIVER: local
  ASSET_STORAGE_DIR: /var/lib/artifact/generated-assets

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-artifact}
      POSTGRES_USER: ${POSTGRES_USER:-artifact}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - artifact-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes', '--save', '']
    volumes:
      - artifact-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: ['npm', 'run', 'start:with-migrations']
    environment:
      <<: *artifact-api-env
      API_BULL_BOARD_ENABLED: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - artifact-generated-assets:/var/lib/artifact/generated-assets
    expose:
      - '4000'
    healthcheck:
      test: ['CMD', 'node', 'dist/healthcheck.js', 'api']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      <<: *artifact-api-env
      API_BULL_BOARD_ENABLED: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - artifact-generated-assets:/var/lib/artifact/generated-assets
    healthcheck:
      test: ['CMD', 'node', 'dist/healthcheck.js', 'worker']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  bull-board:
    build:
      context: .
      dockerfile: docker/bull-board.Dockerfile
    environment:
      <<: *artifact-api-env
      API_BULL_BOARD_ENABLED: true
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - artifact-generated-assets:/var/lib/artifact/generated-assets:ro
    expose:
      - '4000'
    labels:
      - 'traefik.http.middlewares.artifact-bull-board-auth.basicauth.users=${BULL_BOARD_BASIC_AUTH_USERS:?Set the Bull Board htpasswd credentials}'
      - 'coolify.traefik.middlewares=artifact-bull-board-auth'
    healthcheck:
      test: ['CMD', 'node', 'dist/healthcheck.js', 'bull-board']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  artifact-generated-assets:
  artifact-postgres-data:
  artifact-redis-data:
