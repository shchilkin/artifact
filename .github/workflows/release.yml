name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 0.34.0"
        required: true
        type: string
      action:
        description: "Release action"
        required: true
        type: choice
        default: verify
        options:
          - verify
          - tag-and-create-draft
          - create-draft
          - publish-draft
          - deploy-production
      run_ai_smoke:
        description: "Run one provider-backed AI generation before promoting the web deployment"
        required: false
        type: boolean
        default: false
      fallow-base:
        description: "Base branch for the changed-code Fallow release audit"
        required: false
        type: string
        default: development

permissions:
  contents: write

concurrency:
  group: ${{ inputs.action == 'deploy-production' && 'production-deploy' || format('release-{0}', inputs.version) }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gate:
    name: Release gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata
        shell: bash
        run: |
          set -euo pipefail

          case "${{ inputs.action }}" in
            verify|tag-and-create-draft|deploy-production)
              tag_policy=()
              ;;
            create-draft|publish-draft)
              tag_policy=(--require-existing-tag)
              ;;
            *)
              echo "Unknown release action: ${{ inputs.action }}" >&2
              exit 1
              ;;
          esac

          npm run release:verify -- --version "${{ inputs.version }}" "${tag_policy[@]}"

      - name: Quality gate
        run: npm run check

      - name: Production build
        run: npm run build:ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Full release browser gate
        run: npm run test:browser:release

      - name: Fallow release audit
        env:
          FALLOW_AGENT_SOURCE: github_actions
        run: npm run --silent fallow:audit -- --base origin/${{ inputs.fallow-base }} --gate new-only

  release:
    name: Production release action
    needs: gate
    if: inputs.action == 'tag-and-create-draft' || inputs.action == 'create-draft' || inputs.action == 'publish-draft'
    runs-on: ubuntu-latest
    environment: production-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require main branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Production releases must run from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Configure Git
        if: inputs.action == 'tag-and-create-draft'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tag
        if: inputs.action == 'tag-and-create-draft'
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          git tag -a "$tag" -m "$tag"
          git push origin "$tag"

      - name: Create draft GitHub Release
        if: inputs.action == 'tag-and-create-draft' || inputs.action == 'create-draft'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          notes="docs/releases/${tag}.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub Release already exists for $tag" >&2
            exit 1
          fi

          gh release create "$tag" \
            --draft \
            --verify-tag \
            --title "$tag" \
            --notes-file "$notes"

      - name: Publish existing draft GitHub Release
        if: inputs.action == 'publish-draft'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "v${{ inputs.version }}" --draft=false --latest

  deploy-production:
    name: Deploy production from verified commit
    needs: gate
    if: inputs.action == 'deploy-production'
    runs-on: ubuntu-latest
    environment: production-release
    permissions:
      contents: read
    env:
      COOLIFY_APPLICATION_UUID: ${{ vars.COOLIFY_APPLICATION_UUID }}
      COOLIFY_BASE_URL: ${{ vars.COOLIFY_BASE_URL }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      DEPLOY_SHA: ${{ github.sha }}
      EXPECTED_API_CONTRACT_VERSION: "1"
      PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
      PRODUCTION_WEB_URL: ${{ vars.PRODUCTION_WEB_URL }}
      VERCEL_CLI_VERSION: "54.21.1"
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout verified commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require main branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Production deploys must run from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install pinned Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Pull Vercel production settings
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build staged web deployment
        run: vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy staged web without production domains
        shell: bash
        run: |
          set -euo pipefail
          staged_url="$(vercel deploy --prebuilt --prod --skip-domain --yes --no-color --meta "artifactBuildSha=${DEPLOY_SHA}" --token="${VERCEL_TOKEN}")"
          if [[ ! "${staged_url}" =~ ^https:// ]]; then
            echo "Vercel did not return a deployment URL: ${staged_url}" >&2
            exit 1
          fi
          echo "STAGED_WEB_URL=${staged_url}" >> "${GITHUB_ENV}"

      - name: Verify staged web deployment
        env:
          VERIFY_TARGET: web
        run: WEB_DEPLOYMENT_URL="${STAGED_WEB_URL}" node scripts/deploy/verify-production.mjs

      - name: Deploy VPS stack from the verified commit
        id: coolify
        run: node scripts/deploy/coolify.mjs

      - name: Verify production API revision and contract
        env:
          VERIFY_TARGET: api
        run: node scripts/deploy/verify-production.mjs

      - name: Run provider-backed AI smoke test
        if: inputs.run_ai_smoke
        env:
          API_SMOKE_BASE_URL: ${{ vars.PRODUCTION_API_URL }}
          API_SMOKE_PROVIDER: openai
          API_SMOKE_TIMEOUT_MS: "120000"
          API_SMOKE_TOKEN: ${{ secrets.PRODUCTION_API_SMOKE_TOKEN }}
        run: node apps/api/scripts/smoke.mjs

      - name: Promote staged web deployment
        run: vercel promote "${STAGED_WEB_URL}" --yes --token="${VERCEL_TOKEN}"

      - name: Verify production web domain
        env:
          VERIFY_TARGET: web
          WEB_DEPLOYMENT_URL: ${{ vars.PRODUCTION_WEB_URL }}
        run: node scripts/deploy/verify-production.mjs

      - name: Summarize production deployment
        shell: bash
        run: |
          echo "### Production deployment" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Commit: \`${DEPLOY_SHA}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Coolify deployment: \`${{ steps.coolify.outputs.deployment-uuid }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Staged Vercel deployment: ${STAGED_WEB_URL}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Production web: ${PRODUCTION_WEB_URL}" >> "${GITHUB_STEP_SUMMARY}"
