services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: artifact
      POSTGRES_USER: artifact
      POSTGRES_PASSWORD: artifact
    ports:
      - '${ARTIFACT_POSTGRES_PORT:-5432}:5432'
    volumes:
      - artifact-postgres-data:/var/lib/postgresql/data
      - ./apps/api/src/db/migrations/001_initial_ai_generation.sql:/docker-entrypoint-initdb.d/001_initial_ai_generation.sql:ro
      - ./apps/api/src/db/migrations/002_users_email_nullable.sql:/docker-entrypoint-initdb.d/002_users_email_nullable.sql:ro
      - ./apps/api/src/db/migrations/003_active_generation_guard.sql:/docker-entrypoint-initdb.d/003_active_generation_guard.sql:ro
      - ./apps/api/src/db/migrations/004_better_auth_cloud_projects.sql:/docker-entrypoint-initdb.d/004_better_auth_cloud_projects.sql:ro
      - ./apps/api/docker/init/002_local_dev_seed.sql:/docker-entrypoint-initdb.d/002_local_dev_seed.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U artifact -d artifact']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '${ARTIFACT_REDIS_PORT:-6379}:6379'
    volumes:
      - artifact-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  artifact-postgres-data:
  artifact-redis-data:
