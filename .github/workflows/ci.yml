name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [development, main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      # Skip the favicon script (requires GPU/WebGL via Puppeteer).
      # public/favicon.png is committed and used as the fallback.
      - run: npx react-router build
