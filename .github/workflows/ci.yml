name: CI

on:
  push:
    branches: [main, development]
    tags: ["v*"]
  pull_request:
    branches: [development, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fast quality gate
        run: npm run check

      - name: Production build
        run: npm run build:ci

  fallow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fallow baseline report
        env:
          FALLOW_AGENT_SOURCE: github_actions
        run: npm run --silent fallow -- --summary || true

      - name: Fallow changed-code audit
        if: github.event_name == 'pull_request'
        env:
          FALLOW_AGENT_SOURCE: github_actions
        run: npm run --silent fallow:audit -- --base origin/${{ github.base_ref }} || true

  release-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release metadata changes
        id: release_files
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
              base="HEAD^"
            fi
          fi

          if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          changed="$(git diff --name-only "$base" HEAD || true)"
          echo "$changed"

          if echo "$changed" | grep -Eq '^(package\.json|package-lock\.json|apps/web/package\.json|docs/releases/.*|docs/version-plans/.*|docs/production-readiness\.md|docs/release-template\.md|scripts/verify-release\.mjs|\.github/workflows/release\.yml)$'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.release_files.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.release_files.outputs.should_run == 'true'
        run: npm ci

      - name: Verify release metadata
        if: steps.release_files.outputs.should_run == 'true'
        run: npm run release:verify -- --skip-tag-check

  browser-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.browser_files.outputs.should_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect browser-relevant changes
        id: browser_files
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="origin/${{ github.base_ref }}"
          fi

          changed="$(git diff --name-only "$base" HEAD || true)"
          echo "$changed"

          if echo "$changed" | grep -Eq '^(\.github/workflows/ci\.yml|package\.json|package-lock\.json|playwright\.config\.ts|apps/|packages/|tests/browser/)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  browser:
    needs: browser-changes
    if: needs.browser-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    name: browser (${{ matrix.project }})
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, mobile-chromium, mobile-webkit]
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser test font fixture
        run: apt-get update && apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Cross-browser editor smoke tests
        env:
          HOME: /root
        run: npm run test:browser -- --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  container-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.container_files.outputs.should_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect container-relevant changes
        id: container_files
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
              base="HEAD^"
            fi
          fi

          if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          changed="$(git diff --name-only "$base" HEAD || true)"
          echo "$changed"

          if echo "$changed" | grep -Eq '^(\.github/workflows/(ci|container-images)\.yml|docker/|docker-compose\.coolify\.yml|apps/(api|backoffice)/|packages/|package\.json|package-lock\.json|turbo\.json)$'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  container-gate:
    name: container gate
    needs: [quality, browser-changes, browser, container-changes]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}

    steps:
      - name: Verify container build prerequisites
        id: gate
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          BROWSER_CHANGES_RESULT: ${{ needs.browser-changes.result }}
          BROWSER_REQUIRED: ${{ needs.browser-changes.outputs.should_run }}
          BROWSER_RESULT: ${{ needs.browser.result }}
          CONTAINER_CHANGES_RESULT: ${{ needs.container-changes.result }}
          CONTAINER_REQUIRED: ${{ needs.container-changes.outputs.should_run }}
        shell: bash
        run: |
          set -euo pipefail

          fail_gate() {
            echo "::error title=Container gate blocked::$1"
            exit 1
          }

          if [ "$QUALITY_RESULT" != "success" ]; then
            fail_gate "Quality result was '$QUALITY_RESULT'."
          fi

          if [ "$BROWSER_CHANGES_RESULT" != "success" ]; then
            fail_gate "Browser change detection result was '$BROWSER_CHANGES_RESULT'."
          fi

          if [ "$CONTAINER_CHANGES_RESULT" != "success" ]; then
            fail_gate "Container change detection result was '$CONTAINER_CHANGES_RESULT'."
          fi

          if [ "$BROWSER_REQUIRED" = "true" ] && [ "$BROWSER_RESULT" != "success" ]; then
            fail_gate "Required browser matrix result was '$BROWSER_RESULT'."
          fi

          if [ "$CONTAINER_REQUIRED" != "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "No container-relevant changes were detected." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "Quality and required browser checks passed. Container builds may start." >> "$GITHUB_STEP_SUMMARY"

  container-images:
    name: container (${{ matrix.name }})
    needs: container-gate
    if: needs.container-gate.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: API
            image: artifact-api
            dockerfile: docker/api.Dockerfile
          - name: Worker
            image: artifact-worker
            dockerfile: docker/worker.Dockerfile
          - name: Bull Board
            image: artifact-bull-board
            dockerfile: docker/bull-board.Dockerfile
          - name: Backoffice
            image: artifact-backoffice
            dockerfile: docker/backoffice.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Dockerfile
        id: dockerfile
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Skipping ${{ matrix.name }} image::${{ matrix.dockerfile }} does not exist yet."
          fi

      - name: Set image namespace
        id: image
        if: steps.dockerfile.outputs.exists == 'true'
        run: |
          echo "namespace=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Decide whether to push
        id: publish
        if: steps.dockerfile.outputs.exists == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ] && { [ "$REF_NAME" = "development" ] || [ "$REF_NAME" = "main" ]; }; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.publish.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Collect image metadata
        id: meta
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.namespace }}/${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr

      - name: Build image
        id: build
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ steps.publish.outputs.enabled == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max,ignore-error=true

      - name: Summarize built image
        if: steps.dockerfile.outputs.exists == 'true'
        run: |
          echo "### ${{ matrix.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Dockerfile: \`${{ matrix.dockerfile }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Pushed: \`${{ steps.publish.outputs.enabled }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- `/' | sed 's/$/`/' >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.build.outputs.digest }}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Summarize skipped image
        if: steps.dockerfile.outputs.exists != 'true'
        run: |
          echo "### ${{ matrix.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Skipped because \`${{ matrix.dockerfile }}\` is not present in this branch." >> "$GITHUB_STEP_SUMMARY"
